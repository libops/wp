services:
  traefik:
    command:
      - --providers.file.filename=/etc/traefik/dynamic/wordpress.yml
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:?set ACME_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
    environment:
      DOMAIN: "${DOMAIN:?set DOMAIN}"
      TRAEFIK_TLS_ENABLED: "true"
    ports:
      - 443:443
    volumes:
      - ./certs/letsencrypt:/letsencrypt:rw

  wp:
    environment:
      WORDPRESS_ENABLE_HTTPS: "true"
      WORDPRESS_HOME: "https://${DOMAIN:?set DOMAIN}"
      WORDPRESS_SITEURL: "https://${DOMAIN:?set DOMAIN}/wp"
