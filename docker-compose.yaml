---
x-common: &common
  restart: unless-stopped
  networks:
    default:

networks:
  default:
volumes:
  mariadb-data: {}
  wordpress-uploads: {}

secrets:
  DB_ROOT_PASSWORD:
    file: ./secrets/DB_ROOT_PASSWORD
  WORDPRESS_DB_PASSWORD:
    file: ./secrets/WORDPRESS_DB_PASSWORD
  WORDPRESS_ADMIN_PASSWORD:
    file: ./secrets/WORDPRESS_ADMIN_PASSWORD
  WORDPRESS_AUTH_KEY:
    file: ./secrets/WORDPRESS_AUTH_KEY
  WORDPRESS_SECURE_AUTH_KEY:
    file: ./secrets/WORDPRESS_SECURE_AUTH_KEY
  WORDPRESS_LOGGED_IN_KEY:
    file: ./secrets/WORDPRESS_LOGGED_IN_KEY
  WORDPRESS_NONCE_KEY:
    file: ./secrets/WORDPRESS_NONCE_KEY
  WORDPRESS_AUTH_SALT:
    file: ./secrets/WORDPRESS_AUTH_SALT
  WORDPRESS_SECURE_AUTH_SALT:
    file: ./secrets/WORDPRESS_SECURE_AUTH_SALT
  WORDPRESS_LOGGED_IN_SALT:
    file: ./secrets/WORDPRESS_LOGGED_IN_SALT
  WORDPRESS_NONCE_SALT:
    file: ./secrets/WORDPRESS_NONCE_SALT

services:
  traefik:
    <<: *common
    image: traefik:v3.7.8@sha256:4299bbed850421258fc5448c2e0e6ad350981d4d335a68de11b92448aedbefe5
    command:
      - --ping=true
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
      - --entrypoints.web.transport.respondingTimeouts.readTimeout=300s
    ports:
      - "80:80"
    volumes:
      - ./conf/traefik:/etc/traefik/dynamic:ro,z
    depends_on:
      wp:
        condition: service_healthy
    healthcheck:
      test: traefik healthcheck --ping
      start_period: 10s

  init:
    image: libops/base:3.2.2.0@sha256:c352cf640f32e37e0a4372cb96bba4aa9be1ea05b78441f744c75a5dd7534b28
    restart: no
    working_dir: /
    volumes:
      - ./secrets:/secrets:rw,z
      - ./scripts:/scripts:ro,z
      - ./docker-compose.yaml:/docker-compose.yaml:ro,z
    command: /scripts/generate-secrets.sh
    profiles: [none]

  wp:
    <<: *common
    build:
      context: .
    working_dir: /var/www/bedrock
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      LIBOPS_SMTP_HOST: "${LIBOPS_SMTP_HOST:-host.docker.internal}"
      LIBOPS_SMTP_PORT: "${LIBOPS_SMTP_PORT:-25}"
      SMTP_FROM: "${SMTP_FROM:-}"
      INGRESS_HOSTNAMES: "localhost"
      INGRESS_SCHEME: "http"
    secrets:
      - source: WORDPRESS_AUTH_KEY
      - source: WORDPRESS_SECURE_AUTH_KEY
      - source: WORDPRESS_LOGGED_IN_KEY
      - source: WORDPRESS_NONCE_KEY
      - source: WORDPRESS_AUTH_SALT
      - source: WORDPRESS_SECURE_AUTH_SALT
      - source: WORDPRESS_LOGGED_IN_SALT
      - source: WORDPRESS_NONCE_SALT
      - source: WORDPRESS_DB_PASSWORD
        target: DB_PASSWORD
      - source: WORDPRESS_ADMIN_PASSWORD
    volumes:
      - wordpress-uploads:/var/www/bedrock/web/app/uploads:rw
    depends_on:
      database-init:
        condition: service_completed_successfully
      mariadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -f /installed && wget -q --spider http://localhost/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 5m

  database-init:
    image: libops/base:3.2.2.0@sha256:c352cf640f32e37e0a4372cb96bba4aa9be1ea05b78441f744c75a5dd7534b28
    restart: "no"
    networks:
      default:
    environment:
      DB_HOST: mariadb
      DB_PORT: "3306"
      DB_NAME: wordpress
      DB_USER: wordpress
      DB_CHARACTER_SET: utf8mb4
      DB_COLLATION: utf8mb4_unicode_ci
    secrets:
      - source: DB_ROOT_PASSWORD
      - source: WORDPRESS_DB_PASSWORD
        target: DB_PASSWORD
    volumes:
      - ./scripts/init-database.sh:/usr/local/bin/init-database.sh:ro,z
    entrypoint: /usr/local/bin/init-database.sh
    depends_on:
      mariadb:
        condition: service_healthy

  mariadb:
    <<: *common
    image: libops/mariadb:11@sha256:e629d8de6b3831aed084111cbb2eccd507b8b11cf513f1b3c27269c0f136ae2d
    volumes:
      - mariadb-data:/var/lib/mysql:rw
    secrets:
      - source: DB_ROOT_PASSWORD
